name: CI

on:
  push:
    branches: [main, trunk]
  pull_request:
    branches: ["*"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install bandit pip-audit

      - name: Lint
        run: |
          ruff check src tests

      - name: Security scan (static)
        run: |
          bandit -q -r src

      - name: Dependency vulnerability scan
        run: |
          pip-audit

      - name: Run tests
        run: |
          pytest

  deploy-approval:
    if: github.ref == 'refs/heads/main'
    needs: lint-and-test
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Await manual approval for deployment
        run: echo "Deployment requires environment approval via GitHub Environments."
