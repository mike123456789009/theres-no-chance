secrets:
  provider: "env"
  env_prefix: ""

kalshi_api:
  environment: "production"
  rest_base_url: "https://api.kalshi.com/trade-api/v2"
  websocket_url: "wss://api.kalshi.com/trade-api/v2/ws"
  api_key_id: "secret://env/KALSHI_API_KEY_ID"
  private_key: "secret://env/KALSHI_PRIVATE_KEY_PEM"
  private_key_path: ${KALSHI_PRIVATE_KEY_PATH:-}
  dry_run: ${APP_DRY_RUN:-false}
  request_timeout_seconds: 5.0
  max_retries: 5

research:
  provider: "openai"
  model: "gpt-5"
  temperature: 0.1
  min_sources: 1
  approved_domains: []
  request_timeout_seconds: 300.0
  api_key_env: null
  api_key: "secret://env/OPENAI_API_KEY"
  reasoning_effort: "high"
  max_output_tokens: 8000
  verbosity: "medium"
  min_confidence: 0.65
  max_attempts: 3
  fallbacks: []

app:
  dry_run: ${APP_DRY_RUN:-false}
  log_level: "INFO"

risk:
  max_notional_per_market: 5000.0
  max_theme_exposure: 20000.0
  freeze_minutes: 10
  kelly_scale: 0.15
  ev_threshold_cents: 2
  max_contracts_per_trade: 500
  max_notional_per_trade: 1000.0
  bankroll_dollars: 10000.0
  theme_limits:
    energy: 4000.0
    politics: 8000.0
  market_theme_map: {}
  max_daily_loss: 1500.0
  stop_out_drawdown: 3000.0
  cooldown_minutes: 30
  restricted_markets: []
  restricted_categories: []
  manual_override_markets: []
  margin_buffer: 0.3
  manual_override_file: "artifacts/control/manual_overrides.json"

execution:
  post_only_default: false
  reprice_tick: 1
  max_child_orders: 10
  max_cancels_per_min: 30

telemetry:
  enable_metrics: true
  metrics_endpoint: null
  enable_alerts: true
  alert_channels:
    - type: log
      severity_threshold: INFO
    - type: slack
      target: ${PROD_ALERT_SLACK_WEBHOOK:-}
      severity_threshold: WARNING
    - type: email
      target: trading-ops@example.com
      severity_threshold: ERROR
  log_level: "INFO"

database:
  dsn_env: "AUTOTRADER_DATABASE_DSN"
  pool_min_size: 5
  pool_max_size: 15

scanner:
  limit: 250
  include_keywords:
    - "cpi"
    - "inflation"
    - "payroll"
    - "unemployment"
    - "rate"
    - "fomc"
    - "gdp"
    - "treasury"
    - "interest"
    - "election"
    - "senate"
    - "house"
    - "president"
    - "vote"
    - "trump"
    - "gas"
    - "oil"
    - "price"
  exclude_prefixes:
    - "KXQUICKSETTLE"
    - "KXCOINFLIP"
  exclude_keywords:
    - "rotten tomatoes"
    - "temperature"
    - "press briefing"
  target_prefixes:
    - "KXAAAGAS"
    - "KXAAAOIL"
    - "KXAAAGOLD"
    - "KXSP"
    - "KXUSGOV"
    - "KXUSRATE"
    - "KXUSCPI"
    - "KXUSGDP"
    - "KXNONFARM"
    - "KXUNEMP"
    - "KXTRUMP"
    - "KXPRECPI"
  min_open_interest: 10
  min_volume_24h: 10
  fallback_top_n: 12
  heartbeat_seconds: 10
  delta_price_ticks: 1
  delta_quantity: 50
  snapshot_path: "artifacts/orderbooks/production"
  snapshot_retention: 100

strategy:
  enabled: true
  packs:
    - "core"
  momentum_overlay:
    enabled: true
    threshold: 0.0015
    ev_boost: 0.0025
    size_boost: 0.3
    liquidity_boost: 0.15
    negative_ev_penalty: 0.0035
    negative_size_penalty: 0.6
    negative_liquidity_penalty: 0.45
  event_suppressor:
    enabled: true
    cooldown_minutes: 45
    suppressed_keywords:
      - "cancelled"
      - "postponed"
      - "delayed"
    category_blocks: []
    confidence_floor: 0.6
    low_confidence_size_multiplier: 0.4
  pair_trade_arb:
    enabled: true
    groups: {}
    spread_threshold: 0.04
    ev_boost: 0.003
    liquidity_boost: 0.15
    size_penalty: 0.7
