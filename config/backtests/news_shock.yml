name: news_shock
description: High-volatility news scenario with elevated suppressor settings.
dataset: artifacts/datasets/backtests/demo_baseline.jsonl
adjustments:
  microstructure_penalty_add: 0.03
  slippage_bps: 50.0
  liquidity_scalar: 0.6
  spread_multiplier: 1.8
  scenario_tags:
    - headline_risk
    - event_risk
overrides:
  strategy:
    event_suppressor:
      confidence_floor: 0.65
      low_confidence_size_multiplier: 0.3
    pair_trade_arb:
      enabled: true
      spread_threshold: 0.03
      groups:
        macro_pair:
          - KXTEST
          - KXTEST3
