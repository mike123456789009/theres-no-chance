name: stressed_spread
description: Spread-widened scenario approximating thin liquidity periods.
dataset: artifacts/datasets/backtests/demo_baseline.jsonl
adjustments:
  microstructure_penalty_add: 0.02
  slippage_bps: 35.0
  liquidity_scalar: 0.7
  spread_multiplier: 1.6
  scenario_tags:
    - volatility_high
    - liquidity_stress
overrides:
  strategy:
    momentum_overlay:
      threshold: 0.003
      negative_ev_penalty: 0.004
    event_suppressor:
      cooldown_minutes: 45
