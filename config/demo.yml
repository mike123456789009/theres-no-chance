secrets:
  provider: "env"
  env_prefix: ""

kalshi_api:
  environment: "demo"
  rest_base_url: "https://api.elections.kalshi.com/trade-api/v2"
  websocket_url: "wss://api.elections.kalshi.com/trade-api/v2/ws"
  api_key_id: "secret://env/KALSHI_API_KEY_ID"
  private_key: "secret://env/KALSHI_PRIVATE_KEY_PEM?optional=true"
  private_key_path: ${KALSHI_PRIVATE_KEY_PATH:-}
  dry_run: true
  request_timeout_seconds: 10.0
  max_retries: 3

research:
  provider: "openai"
  model: "gpt-5"
  temperature: null
  min_sources: 0
  approved_domains: []
  request_timeout_seconds: 600.0
  api_key_env: null
  api_key: "secret://env/OPENAI_API_KEY?optional=true"
  reasoning_effort: "high"
  max_output_tokens: 10000
  verbosity: "high"
  min_confidence: 0.55
  max_attempts: 3
  fallbacks: []

app:
  dry_run: true
  log_level: "INFO"

risk:
  max_notional_per_market: 2000.0
  max_theme_exposure: 5000.0
  freeze_minutes: 5
  kelly_scale: 0.2
  ev_threshold_cents: 1
  max_contracts_per_trade: 100
  max_notional_per_trade: 200.0
  bankroll_dollars: 500.0
  theme_limits:
    energy: 1000.0
    politics: 1500.0
  market_theme_map: {}
  max_daily_loss: 250.0
  stop_out_drawdown: 500.0
  cooldown_minutes: 10
  restricted_markets: []
  restricted_categories: []
  manual_override_markets: []
  margin_buffer: 0.25
  manual_override_file: "artifacts/control/manual_overrides.json"

execution:
  post_only_default: true
  reprice_tick: 1
  max_child_orders: 5
  max_cancels_per_min: 20

telemetry:
  enable_metrics: true
  metrics_endpoint: null
  enable_alerts: true
  alert_channels:
    - type: log
      severity_threshold: INFO
    - type: slack
      target: ${SHADOW_ALERT_WEBHOOK:-}
      severity_threshold: WARNING
    - type: email
      target: ops-demo@example.com
      severity_threshold: ERROR
  log_level: "INFO"

database:
  dsn_env: "AUTOTRADER_DATABASE_DSN"
  pool_min_size: 2
  pool_max_size: 5

scanner:
  limit: 150
  include_keywords:
    - "cpi"
    - "inflation"
    - "payroll"
    - "unemployment"
    - "rate"
    - "fomc"
    - "gdp"
    - "treasury"
    - "interest"
    - "election"
    - "senate"
    - "house"
    - "president"
    - "vote"
    - "trump"
    - "gas"
    - "oil"
    - "price"
  exclude_prefixes:
    - "KXQUICKSETTLE"
    - "KXCOINFLIP"
  exclude_keywords:
    - "rotten tomatoes"
    - "temperature"
    - "press briefing"
  target_prefixes:
    - "KXAAAGAS"
    - "KXAAAOIL"
    - "KXAAAGOLD"
    - "KXSP"
    - "KXUSGOV"
    - "KXUSRATE"
    - "KXUSCPI"
    - "KXUSGDP"
    - "KXNONFARM"
    - "KXUNEMP"
    - "KXTRUMP"
    - "KXPRECPI"
  min_open_interest: 5
  min_volume_24h: 1
  fallback_top_n: 12
  heartbeat_seconds: 15
  delta_price_ticks: 1
  delta_quantity: 25
  snapshot_path: "artifacts/orderbooks/demo"
  snapshot_retention: 50

strategy:
  enabled: true
  packs:
    - "core"
  momentum_overlay:
    enabled: true
    threshold: 0.002
    ev_boost: 0.002
    size_boost: 0.25
    liquidity_boost: 0.1
    negative_ev_penalty: 0.003
    negative_size_penalty: 0.5
    negative_liquidity_penalty: 0.4
  event_suppressor:
    enabled: true
    cooldown_minutes: 30
    suppressed_keywords:
      - "cancelled"
      - "postponed"
      - "delayed"
    category_blocks: []
    confidence_floor: 0.55
    low_confidence_size_multiplier: 0.5
  pair_trade_arb:
    enabled: false
    groups: {}
    spread_threshold: 0.05
    ev_boost: 0.003
    liquidity_boost: 0.15
    size_penalty: 0.6
